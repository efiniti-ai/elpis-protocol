[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "elpis-cli"
version = "0.1.0"
description = "Cryptographic identity for AI agents. One command, 30 seconds, on-chain."
license = "Apache-2.0"
requires-python = ">=3.10"
readme = "README.md"
authors = [
    { name = "EFINITI GmbH", email = "dev@efiniti.de" },
]
keywords = ["elpis", "did", "iota", "xrpl", "ai-agent", "identity", "ed25519", "verifiable-credentials"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "click>=8.0",
    "cryptography>=42",
    "httpx>=0.27",
]

[project.optional-dependencies]
xrpl = ["xrpl-py>=3.0"]

[project.urls]
Homepage = "https://elpis.efiniti.ai"
Documentation = "https://elpis.efiniti.ai/paper"
Repository = "https://github.com/efiniti-ai/elpis-protocol"
Issues = "https://github.com/efiniti-ai/elpis-protocol/issues"

[project.scripts]
elpis = "elpis_cli.cli:cli"
